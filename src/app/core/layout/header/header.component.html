<header class="header"
        [class.header--scrolled]="isScrolled()">
  <div class="header__container">

    <div class="header__logo">
      <a routerLink="/" (click)="closeMenu()">LOGO</a>
    </div>

    <!-- DESKTOP NAV -->
    <nav class="header__nav">
      <a routerLink="/" class="nav-link">Главная</a>

      <div class="nav-item">
        <span class="nav-link">Портфолио ▾</span>

        <ul class="dropdown">
          @for (category of categories; track category.slug) {
            <li>
              <a [routerLink]="['/portfolio', category.slug]">
                {{ category.title }}
              </a>
            </li>
          }
        </ul>
      </div>

      <a routerLink="/about" class="nav-link">Обо мне</a>
      <a routerLink="/contacts" class="nav-link">Контакты</a>
    </nav>

    <!-- BURGER BUTTON (Visible only on mobile) -->
    <button class="header__burger" (click)="toggleMenu()">
      ☰
    </button>

  </div>
</header>

@if (isMenuOpen()) {
  <div class="menu" [class.menu--open]="isMenuOpen()">
    <button class="menu__close" (click)="closeMenu()">
      ✕
    </button>

    <div class="menu__inner">
      <a class="menu__link menu__link--large"
         routerLink="/"
         (click)="closeMenu()">
        Главная
      </a>

      <div class="menu__section">
        <div class="menu__label">Портфолио</div>

        @for (category of categories; track category.slug) {
          <a
            class="menu__link menu__link--large menu__link--nested"
            [routerLink]="['/portfolio', category.slug]"
            (click)="closeMenu()"
          >
            {{ category.title }}
          </a>
        }
      </div>

      <a class="menu__link menu__link--large"
         routerLink="/about"
         (click)="closeMenu()">
        Обо мне
      </a>

      <a class="menu__link menu__link--large"
         routerLink="/contacts"
         (click)="closeMenu()">
        Контакты
      </a>
    </div>
  </div>
}
